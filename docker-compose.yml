version: '3.8'

services:
  # قاعدة البيانات
  postgres:
    image: postgres:15-alpine
    container_name: cybersecurity_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cybersecurity_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # الخادم الخلفي
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cybersecurity_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cybersecurity_db
      FLASK_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: python backend/app.py

  # الخادم الأمامي
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cybersecurity_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  default:
    name: cybersecurity_network
